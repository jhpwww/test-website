<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>斜拋運動互動模擬器</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #172033;
      --muted: #657085;
      --line: #d4dae5;
      --paper: #f6f8fb;
      --panel: #ffffff;
      --blue: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background: var(--paper);
      font-family: "Microsoft JhengHei UI", "Noto Sans TC", "Segoe UI", sans-serif;
    }

    button, input { font: inherit; }

    .app-shell {
      display: grid;
      grid-template-columns: minmax(300px, 360px) 1fr;
      min-height: 100vh;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 14px;
      padding: 22px;
      border-right: 1px solid var(--line);
      background: var(--panel);
      overflow-y: auto;
    }

    .home-link {
      color: var(--blue);
      text-decoration: none;
      font-size: 14px;
      font-weight: 700;
    }

    .title-block h1 {
      margin: 8px 0 6px;
      font-size: 25px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .title-block p {
      margin: 0;
      color: var(--muted);
      line-height: 1.5;
    }

    .panel, .metrics {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .panel { padding: 16px; }

    .control-row {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    .control-row:last-child { margin-bottom: 0; }

    .control-row span {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      color: #334155;
      font-size: 14px;
    }

    output {
      color: var(--ink);
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    input[type="range"] {
      width: 100%;
      accent-color: var(--blue);
    }

    .button-bar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    button {
      min-height: 42px;
      border: 1px solid #b9c2d2;
      border-radius: 8px;
      color: #162033;
      background: #fff;
      cursor: pointer;
    }

    button:first-child {
      border-color: var(--blue);
      color: #fff;
      background: var(--blue);
    }

    button:hover { filter: brightness(0.97); }

    .metrics { padding: 12px 14px; }

    .metrics div {
      display: flex;
      justify-content: space-between;
      gap: 14px;
      padding: 8px 0;
      border-bottom: 1px solid #edf1f7;
    }

    .metrics div:last-child { border-bottom: 0; }
    .metrics span { color: var(--muted); }

    .metrics strong {
      font-size: 14px;
      font-variant-numeric: tabular-nums;
      text-align: right;
    }

    .stage {
      min-width: 0;
      min-height: 420px;
      padding: 18px;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
      min-height: calc(100vh - 36px);
      border: 1px solid var(--line);
      background: #f8fafc;
    }

    @media (max-width: 820px) {
      .app-shell { grid-template-columns: 1fr; }
      .controls {
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .stage { min-height: 520px; }
      canvas { min-height: 500px; }
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <aside class="controls" aria-label="參數設定">
      <a class="home-link" href="../">回到首頁</a>
      <div class="title-block">
        <h1>斜拋運動模擬器</h1>
        <p>調整參數並觀察質點軌跡、飛行時間與射程變化。</p>
      </div>

      <section class="panel" aria-label="模擬參數">
        <label class="control-row"><span>初速度 <output id="speedValue">35.0 m/s</output></span><input id="speed" type="range" min="1" max="100" step="0.5" value="35"></label>
        <label class="control-row"><span>發射角 <output id="angleValue">45.0 deg</output></span><input id="angle" type="range" min="0" max="90" step="0.5" value="45"></label>
        <label class="control-row"><span>初始高度 <output id="heightValue">0.0 m</output></span><input id="height" type="range" min="0" max="100" step="0.5" value="0"></label>
        <label class="control-row"><span>重力加速度 <output id="gravityValue">9.81 m/s²</output></span><input id="gravity" type="range" min="1" max="25" step="0.01" value="9.81"></label>
        <label class="control-row"><span>質量 <output id="massValue">1.0 kg</output></span><input id="mass" type="range" min="0.1" max="20" step="0.1" value="1"></label>
        <label class="control-row"><span>阻力係數 <output id="dragValue">0.000</output></span><input id="drag" type="range" min="0" max="0.25" step="0.001" value="0"></label>
      </section>

      <section class="button-bar" aria-label="動畫控制">
        <button id="playButton" type="button">播放</button>
        <button id="resetButton" type="button">重設</button>
      </section>

      <section class="metrics" aria-label="計算結果">
        <div><span>水平射程</span><strong id="rangeMetric">0.00 m</strong></div>
        <div><span>飛行時間</span><strong id="timeMetric">0.00 s</strong></div>
        <div><span>最高高度</span><strong id="heightMetric">0.00 m</strong></div>
        <div><span>目前位置</span><strong id="positionMetric">(0.00, 0.00) m</strong></div>
      </section>
    </aside>

    <section class="stage" aria-label="斜拋軌跡圖">
      <canvas id="trajectoryCanvas"></canvas>
    </section>
  </main>

  <script>
    const canvas = document.getElementById("trajectoryCanvas");
    const ctx = canvas.getContext("2d");
    const controls = {
      speed: document.getElementById("speed"),
      angle: document.getElementById("angle"),
      height: document.getElementById("height"),
      gravity: document.getElementById("gravity"),
      mass: document.getElementById("mass"),
      drag: document.getElementById("drag"),
    };
    const labels = {
      speed: document.getElementById("speedValue"),
      angle: document.getElementById("angleValue"),
      height: document.getElementById("heightValue"),
      gravity: document.getElementById("gravityValue"),
      mass: document.getElementById("massValue"),
      drag: document.getElementById("dragValue"),
    };
    const metrics = {
      range: document.getElementById("rangeMetric"),
      time: document.getElementById("timeMetric"),
      height: document.getElementById("heightMetric"),
      position: document.getElementById("positionMetric"),
    };
    const playButton = document.getElementById("playButton");
    const resetButton = document.getElementById("resetButton");
    let points = [];
    let maxX = 1;
    let maxY = 1;
    let totalTime = 0;
    let currentTime = 0;
    let isPlaying = false;
    let lastFrameTime = null;

    function params() {
      return {
        speed: Number(controls.speed.value),
        angle: Number(controls.angle.value),
        height: Number(controls.height.value),
        gravity: Number(controls.gravity.value),
        mass: Math.max(Number(controls.mass.value), 0.001),
        drag: Number(controls.drag.value),
      };
    }

    function updateLabels() {
      const p = params();
      labels.speed.textContent = `${p.speed.toFixed(1)} m/s`;
      labels.angle.textContent = `${p.angle.toFixed(1)} deg`;
      labels.height.textContent = `${p.height.toFixed(1)} m`;
      labels.gravity.textContent = `${p.gravity.toFixed(2)} m/s²`;
      labels.mass.textContent = `${p.mass.toFixed(1)} kg`;
      labels.drag.textContent = p.drag.toFixed(3);
    }

    function simulate() {
      const p = params();
      const angleRad = (p.angle * Math.PI) / 180;
      let x = 0;
      let y = p.height;
      let vx = p.speed * Math.cos(angleRad);
      let vy = p.speed * Math.sin(angleRad);
      let t = 0;
      const dt = p.drag > 0 ? 0.015 : 0.03;
      const nextPoints = [{ t, x, y }];

      while (t < 120) {
        let nextX;
        let nextY;
        if (p.drag > 0) {
          const velocity = Math.hypot(vx, vy);
          const dragAccel = (p.drag * velocity) / p.mass;
          vx += -dragAccel * vx * dt;
          vy += (-p.gravity - dragAccel * vy) * dt;
          nextX = x + vx * dt;
          nextY = y + vy * dt;
        } else {
          const nextT = t + dt;
          nextX = p.speed * Math.cos(angleRad) * nextT;
          nextY = p.height + p.speed * Math.sin(angleRad) * nextT - 0.5 * p.gravity * nextT * nextT;
        }
        t += dt;
        if (nextY < 0) {
          const ratio = y === nextY ? 1 : y / (y - nextY);
          nextPoints.push({ t: t - dt + ratio * dt, x: x + ratio * (nextX - x), y: 0 });
          break;
        }
        x = nextX;
        y = nextY;
        nextPoints.push({ t, x, y });
      }
      points = nextPoints;
      totalTime = points.at(-1)?.t ?? 0;
      maxX = Math.max(1, ...points.map((point) => point.x));
      maxY = Math.max(1, ...points.map((point) => point.y));
      currentTime = Math.min(currentTime, totalTime);
    }

    function pointAtTime(time) {
      if (points.length === 0) return { t: 0, x: 0, y: 0 };
      if (time <= 0) return points[0];
      if (time >= totalTime) return points.at(-1);
      for (let index = 1; index < points.length; index += 1) {
        const previous = points[index - 1];
        const current = points[index];
        if (current.t >= time) {
          const span = current.t - previous.t || 1;
          const ratio = (time - previous.t) / span;
          return { t: time, x: previous.x + ratio * (current.x - previous.x), y: previous.y + ratio * (current.y - previous.y) };
        }
      }
      return points.at(-1);
    }

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();
      const ratio = window.devicePixelRatio || 1;
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
    }

    function drawGrid(width, height, margins) {
      const groundY = height - margins.bottom;
      ctx.strokeStyle = "#e2e8f0";
      ctx.lineWidth = 1;
      for (let i = 0; i <= 5; i += 1) {
        const y = margins.top + (i * (groundY - margins.top)) / 5;
        ctx.beginPath(); ctx.moveTo(margins.left, y); ctx.lineTo(width - margins.right, y); ctx.stroke();
      }
      for (let i = 0; i <= 6; i += 1) {
        const x = margins.left + (i * (width - margins.left - margins.right)) / 6;
        ctx.beginPath(); ctx.moveTo(x, margins.top); ctx.lineTo(x, groundY); ctx.stroke();
      }
    }

    function draw() {
      resizeCanvas();
      const width = canvas.getBoundingClientRect().width;
      const height = canvas.getBoundingClientRect().height;
      const margins = { left: 64, right: 28, top: 30, bottom: 58 };
      const plotWidth = width - margins.left - margins.right;
      const plotHeight = height - margins.top - margins.bottom;
      const groundY = height - margins.bottom;
      const scale = Math.min(plotWidth / (maxX * 1.08), plotHeight / (maxY * 1.18));
      const current = pointAtTime(currentTime);
      function screen(point) { return { x: margins.left + point.x * scale, y: groundY - point.y * scale }; }
      ctx.clearRect(0, 0, width, height);
      drawGrid(width, height, margins);
      ctx.strokeStyle = "#334155"; ctx.lineWidth = 2;
      ctx.beginPath(); ctx.moveTo(margins.left, margins.top); ctx.lineTo(margins.left, groundY); ctx.lineTo(width - margins.right, groundY); ctx.stroke();
      if (points.length > 1) {
        ctx.strokeStyle = "#2563eb"; ctx.lineWidth = 3; ctx.beginPath();
        points.forEach((point, index) => { const p = screen(point); if (index === 0) ctx.moveTo(p.x, p.y); else ctx.lineTo(p.x, p.y); });
        ctx.stroke();
      }
      const launch = screen({ x: 0, y: params().height });
      const dot = screen(current);
      ctx.fillStyle = "#16a34a"; ctx.beginPath(); ctx.arc(launch.x, launch.y, 5, 0, Math.PI * 2); ctx.fill();
      ctx.strokeStyle = "#ef4444"; ctx.setLineDash([4, 4]); ctx.beginPath(); ctx.moveTo(dot.x, dot.y); ctx.lineTo(dot.x, groundY); ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle = "#dc2626"; ctx.beginPath(); ctx.arc(dot.x, dot.y, 8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = "#111827"; ctx.font = "14px 'Segoe UI', sans-serif";
      const label = `x=${current.x.toFixed(2)} m, y=${current.y.toFixed(2)} m, t=${current.t.toFixed(2)} s`;
      const labelX = Math.min(dot.x + 12, width - 260);
      ctx.fillText(label, Math.max(margins.left + 8, labelX), Math.max(margins.top + 18, dot.y - 18));
      ctx.fillStyle = "#334155"; ctx.font = "13px 'Segoe UI', sans-serif";
      ctx.fillText("水平距離 x (m)", width / 2 - 44, height - 20);
      ctx.save(); ctx.translate(20, height / 2 + 42); ctx.rotate(-Math.PI / 2); ctx.fillText("高度 y (m)", 0, 0); ctx.restore();
      metrics.range.textContent = `${maxX.toFixed(2)} m`;
      metrics.time.textContent = `${totalTime.toFixed(2)} s`;
      metrics.height.textContent = `${maxY.toFixed(2)} m`;
      metrics.position.textContent = `(${current.x.toFixed(2)}, ${current.y.toFixed(2)}) m`;
    }

    function recalculate() { updateLabels(); simulate(); draw(); }
    function animate(timestamp) {
      if (!isPlaying) { lastFrameTime = null; return; }
      if (lastFrameTime === null) lastFrameTime = timestamp;
      const elapsedSeconds = Math.min((timestamp - lastFrameTime) / 1000, 0.05);
      lastFrameTime = timestamp;
      currentTime += elapsedSeconds;
      if (currentTime >= totalTime) { currentTime = totalTime; isPlaying = false; playButton.textContent = "播放"; }
      draw(); requestAnimationFrame(animate);
    }
    Object.values(controls).forEach((control) => control.addEventListener("input", recalculate));
    playButton.addEventListener("click", () => { isPlaying = !isPlaying; playButton.textContent = isPlaying ? "暫停" : "播放"; if (isPlaying) requestAnimationFrame(animate); });
    resetButton.addEventListener("click", () => { isPlaying = false; currentTime = 0; playButton.textContent = "播放"; draw(); });
    window.addEventListener("resize", draw);
    recalculate();
  </script>
</body>
</html>
